<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-label="ESP32-S3 scanner diagram">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fdfb"/>
      <stop offset="1" stop-color="#eafaf3"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1fff7"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f2f1f" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #111827; }
      .sub   { font: 500 16px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #374151; }
      .chip  { fill: #0b1220; }
      .chipT { font: 700 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #e5e7eb; }
      .pin   { stroke: #111827; stroke-width: 4; stroke-linecap: round; opacity: .85; }
      .badge { font: 600 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #111827; }
      .hint  { font: 500 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #6b7280; }
    </style>
  </defs>

  <rect x="0" y="0" width="820" height="520" rx="28" fill="url(#bg2)"/>

  <g filter="url(#shadow2)">
    <rect x="70" y="78" width="680" height="340" rx="28" fill="url(#card2)" stroke="#b7f7d1" stroke-width="2"/>

    <!-- pins -->
    <g transform="translate(98,120)">
      <line class="pin" x1="0" y1="0" x2="0" y2="0"/>
      <line class="pin" x1="0" y1="32" x2="0" y2="32"/>
      <line class="pin" x1="0" y1="64" x2="0" y2="64"/>
      <line class="pin" x1="0" y1="96" x2="0" y2="96"/>
      <line class="pin" x1="0" y1="128" x2="0" y2="128"/>
      <line class="pin" x1="0" y1="160" x2="0" y2="160"/>
      <line class="pin" x1="0" y1="192" x2="0" y2="192"/>
      <line class="pin" x1="0" y1="224" x2="0" y2="224"/>
    </g>
    <g transform="translate(722,120)">
      <line class="pin" x1="0" y1="0" x2="0" y2="0"/>
      <line class="pin" x1="0" y1="32" x2="0" y2="32"/>
      <line class="pin" x1="0" y1="64" x2="0" y2="64"/>
      <line class="pin" x1="0" y1="96" x2="0" y2="96"/>
      <line class="pin" x1="0" y1="128" x2="0" y2="128"/>
      <line class="pin" x1="0" y1="160" x2="0" y2="160"/>
      <line class="pin" x1="0" y1="192" x2="0" y2="192"/>
      <line class="pin" x1="0" y1="224" x2="0" y2="224"/>
    </g>

    <!-- chip -->
    <rect x="300" y="164" width="220" height="172" rx="18" class="chip"/>
    <text x="410" y="220" text-anchor="middle" class="chipT">ESP32-S3</text>
    <text x="410" y="246" text-anchor="middle" class="chipT" style="font-weight:600; fill:#86efac">Scanner</text>
    <text x="410" y="280" text-anchor="middle" class="chipT" style="font-weight:600; fill:#34d399">Scan + Report</text>

    <!-- WiFi arcs -->
    <g transform="translate(548,172)">
      <path d="M10 70 C38 44, 74 44, 102 70" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" opacity=".25"/>
      <path d="M22 70 C44 52, 68 52, 90 70" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round" opacity=".45"/>
      <path d="M36 70 C50 60, 62 60, 76 70" fill="none" stroke="#10b981" stroke-width="8" stroke-linecap="round"/>
      <circle cx="56" cy="86" r="8" fill="#10b981"/>

      <rect x="8" y="112" width="96" height="34" rx="10" fill="#ecfdf5" stroke="#86efac"/>
      <text x="56" y="134" text-anchor="middle" class="badge" style="fill:#065f46">WebSocket</text>
    </g>

    <!-- arrow and caption -->
    <g transform="translate(168,210)">
      <path d="M0 40 C80 0, 160 0, 240 40" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round" opacity=".25"/>
      <path d="M240 40 L222 26" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round"/>
      <path d="M240 40 L222 54" fill="none" stroke="#34d399" stroke-width="8" stroke-linecap="round"/>
      <text x="120" y="86" text-anchor="middle" class="badge" style="fill:#065f46">Batch upload to server</text>
    </g>

    <!-- badges -->
    <g transform="translate(132,360)">
      <rect x="0" y="0" width="210" height="42" rx="12" fill="#ecfdf5" stroke="#86efac"/>
      <text x="105" y="27" text-anchor="middle" class="badge">BLE Scan</text>
      <rect x="230" y="0" width="210" height="42" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="335" y="27" text-anchor="middle" class="badge">ble_beacon_batch</text>
      <rect x="460" y="0" width="210" height="42" rx="12" fill="#fff7ed" stroke="#fdba74"/>
      <text x="565" y="27" text-anchor="middle" class="badge">Upload to /device</text>
    </g>
  </g>

  <text x="410" y="48" text-anchor="middle" class="title">ESP32-S3 (Scanner)</text>
  <text x="410" y="74" text-anchor="middle" class="sub">Scan C3 beacon RSSI and upload to XRK-AGT /device</text>
  <text x="410" y="470" text-anchor="middle" class="hint">Path: esp32s3/boot.py + esp32s3/loader.py + esp32s3/plugins/blue.py</text>
</svg>

