<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-label="ESP32-C3 beacon diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8fb"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f7ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2a44" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #111827; }
      .sub   { font: 500 16px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #374151; }
      .chip  { fill: #111827; }
      .chipT { font: 700 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #e5e7eb; }
      .pin   { stroke: #111827; stroke-width: 4; stroke-linecap: round; opacity: .85; }
      .badge { font: 600 14px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #111827; }
      .hint  { font: 500 13px ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial; fill: #6b7280; }
    </style>
  </defs>

  <rect x="0" y="0" width="820" height="520" rx="28" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="78" width="680" height="340" rx="28" fill="url(#card)" stroke="#dbe4ff" stroke-width="2"/>

    <!-- pins -->
    <g transform="translate(98,120)">
      <line class="pin" x1="0" y1="0" x2="0" y2="0"/>
      <line class="pin" x1="0" y1="32" x2="0" y2="32"/>
      <line class="pin" x1="0" y1="64" x2="0" y2="64"/>
      <line class="pin" x1="0" y1="96" x2="0" y2="96"/>
      <line class="pin" x1="0" y1="128" x2="0" y2="128"/>
      <line class="pin" x1="0" y1="160" x2="0" y2="160"/>
      <line class="pin" x1="0" y1="192" x2="0" y2="192"/>
      <line class="pin" x1="0" y1="224" x2="0" y2="224"/>
    </g>
    <g transform="translate(722,120)">
      <line class="pin" x1="0" y1="0" x2="0" y2="0"/>
      <line class="pin" x1="0" y1="32" x2="0" y2="32"/>
      <line class="pin" x1="0" y1="64" x2="0" y2="64"/>
      <line class="pin" x1="0" y1="96" x2="0" y2="96"/>
      <line class="pin" x1="0" y1="128" x2="0" y2="128"/>
      <line class="pin" x1="0" y1="160" x2="0" y2="160"/>
      <line class="pin" x1="0" y1="192" x2="0" y2="192"/>
      <line class="pin" x1="0" y1="224" x2="0" y2="224"/>
    </g>

    <!-- chip -->
    <rect x="320" y="176" width="180" height="148" rx="18" class="chip"/>
    <text x="410" y="226" text-anchor="middle" class="chipT">ESP32-C3</text>
    <text x="410" y="252" text-anchor="middle" class="chipT" style="font-weight:600; fill:#c7d2fe">Beacon</text>
    <text x="410" y="286" text-anchor="middle" class="chipT" style="font-weight:600; fill:#a5b4fc">Advertiser</text>

    <!-- BLE signal -->
    <g transform="translate(540,210)">
      <path d="M40 10 L60 30 L40 50 Z" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linejoin="round"/>
      <path d="M40 30 L10 8" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
      <path d="M40 30 L10 52" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
      <path d="M70 30 C78 22, 90 22, 98 30" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round" opacity=".35"/>
      <path d="M86 30 C98 14, 118 14, 130 30" fill="none" stroke="#4f46e5" stroke-width="6" stroke-linecap="round" opacity=".2"/>
    </g>

    <!-- badges -->
    <g transform="translate(140,360)">
      <rect x="0" y="0" width="190" height="42" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
      <text x="95" y="27" text-anchor="middle" class="badge">BLE ADV</text>
      <rect x="210" y="0" width="190" height="42" rx="12" fill="#ecfeff" stroke="#a5f3fc"/>
      <text x="305" y="27" text-anchor="middle" class="badge">Fixed Name/MAC</text>
      <rect x="420" y="0" width="190" height="42" rx="12" fill="#fefce8" stroke="#fde68a"/>
      <text x="515" y="27" text-anchor="middle" class="badge">For S3 Scan</text>
    </g>
  </g>

  <text x="410" y="48" text-anchor="middle" class="title">ESP32-C3 (Beacon)</text>
  <text x="410" y="74" text-anchor="middle" class="sub">Advertise BLE name and MAC as an anchor</text>
  <text x="410" y="470" text-anchor="middle" class="hint">Path: esp32c3mini/boot.py</text>
</svg>

